<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Moon Calendar</title>
  <meta name="theme-color" content="#0b0e14">

  <style>
    :root{
      --bg:#0b0e14; --card:#121a2b; --border:#223155;
      --panel:#0f1830; --panelBorder:#2a3c66;
      --text:#e7eeff; --muted:#b1c2ea; --hint:#8ea4d8;
      --accent:#87a7ff; --explain:#d9e4ff; --shadow:rgba(0,0,0,.35);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    body{ margin:0; background:var(--bg); color:var(--text); }
    .wrap{
      max-width: 980px; margin: 0 auto; padding: 16px;
      padding-top: calc(16px + env(safe-area-inset-top));
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
    }
    .card{
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 10px 30px var(--shadow);
    }
    h1{ font-size: 20px; margin: 0 0 6px; }
    p{ margin: 8px 0; color: var(--muted); line-height: 1.45; font-size: 14px; }
    .title{ font-size: 18px; font-weight: 650; margin: 0 0 6px; }
    .hint{ font-size: 12px; color: var(--hint); line-height: 1.35; margin-top: 8px; }
    .panel{
      background: var(--panel);
      border: 1px solid var(--panelBorder);
      border-radius: 12px;
      padding: 12px;
    }
    .grid2{ display:grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items: start; }
    @media (max-width: 860px){ .grid2{ grid-template-columns: 1fr; } }
    .btnRow{ display:flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    button{
      border-radius: 12px; border: 1px solid var(--panelBorder);
      background: #152449; color: var(--text);
      padding: 8px 12px; font-size: 14px; cursor:pointer;
    }
    button:hover{ filter: brightness(1.08); }
    .chip{
      display:inline-block; padding: 4px 10px; border: 1px solid var(--panelBorder);
      border-radius: 999px; background: #0b1020; color: var(--muted);
      font-size: 12px; white-space: nowrap;
    }
    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12px; color: var(--muted);
    }

    .moonStage{ display:flex; flex-direction: column; align-items:center; gap: 10px; padding: 10px 8px 2px; }
    canvas#bigMoon{ width: 300px; height: 300px; display:block; border-radius: 999px; }

    .kpis{ display:grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 8px; }
    @media (max-width: 520px){ .kpis{ grid-template-columns: 1fr; } }
    .kpi{
      background: #0b1020; border: 1px solid var(--panelBorder);
      border-radius: 12px; padding: 10px 12px;
    }
    .kpi .label{ font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .kpi .value{ font-size: 16px; color: var(--explain); font-weight: 650; }

    .calHead{ display:flex; align-items:center; justify-content:space-between; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
    .weekdays{
      display:grid; grid-template-columns: repeat(7, 1fr);
      gap: 8px; margin-bottom: 8px;
      color: var(--muted); font-size: 12px; font-weight: 650; text-align:center;
    }
    .calGrid{ display:grid; grid-template-columns: repeat(7, 1fr); gap: 10px 8px; }
    .cell{
      height: 64px; border-radius: 12px; border: 1px solid transparent;
      display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
      gap: 7px; padding-top: 8px; cursor:pointer; user-select:none;
    }
    .cell:hover{ border-color: rgba(135,167,255,.35); background: rgba(15,24,48,.35); }
    .cell.today{ border-color: rgba(135,167,255,.55); background: rgba(15,24,48,.55); }
    .cell.selected{ border-color: rgba(135,167,255,.95); background: rgba(15,24,48,.75); }
    .day{ font-size: 12px; font-weight: 700; color: var(--text); line-height: 1; }
    canvas.mini{ width: 18px; height: 18px; display:block; border-radius: 999px; }

    .detailRow{ display:flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .msgTitle{ font-size: 13px; color: var(--accent); font-weight: 650; margin-top: 10px; }
    .msgBody{ margin-top: 10px; color: var(--explain); font-size: 16px; line-height: 1.8; max-width: 44rem; }
    footer{ margin-top: 10px; color: var(--hint); font-size: 12px; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <h1>Moon Calendar</h1>
      <p class="mono" id="todayLabel">—</p>

      <div class="grid2">
        <div class="panel">
          <div class="moonStage">
            <canvas id="bigMoon" width="700" height="700" aria-label="Moon phase"></canvas>
            <div class="mono" id="phaseLabel">—</div>

            <div class="kpis">
              <div class="kpi">
                <div class="label">Next Full Moon</div>
                <div class="value" id="untilFull">—</div>
              </div>
              <div class="kpi">
                <div class="label">Next New Moon</div>
                <div class="value" id="untilNew">—</div>
              </div>
            </div>

            <div class="hint">
              New Moon = fully dark · Full Moon = fully bright (gold) · Quarters are exactly half.
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="calHead">
            <div class="title" id="monthTitle">—</div>
            <div class="btnRow">
              <button id="prevBtn" type="button">Prev</button>
              <button id="nextBtn" type="button">Next</button>
            </div>
          </div>

          <div class="weekdays">
            <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
          </div>

          <div class="calGrid" id="calendarGrid"></div>

          <div class="msgTitle" id="holisticTitle">Reflection</div>
          <div class="msgBody" id="holisticText">Select a day to see the theme.</div>

          <div class="detailRow">
            <span class="chip" id="selectedDatePill">Selected: —</span>
            <span class="chip" id="selectedPhasePill">Phase: —</span>
            <span class="chip" id="selectedIllumPill">Illumination: —</span>
          </div>
        </div>
      </div>

      <footer>Practical phase approximation (synodic month).</footer>
    </div>
  </div>

<script>
/* ========= Moon math (same as before) ========= */
const Moon = (() => {
  const synodicMonth = 29.53058867;
  const epoch = new Date(Date.UTC(2000,0,6,18,14,0));

  function phase(date){
    const ms = date.getTime() - epoch.getTime();
    const days = ms / 86400000;
    const lunations = days / synodicMonth;
    let frac = lunations - Math.floor(lunations);
    if (frac < 0) frac += 1;
    return frac;
  }

  function illumination(p){
    return 0.5 * (1 - Math.cos(2 * Math.PI * p));
  }

  function daysUntilNewMoon(date){
    const p = phase(date);
    return Math.max(0, Math.round((1 - p) * synodicMonth));
  }

  function daysUntilFullMoon(date){
    const p = phase(date);
    let delta = (0.5 - p);
    if (delta < 0) delta = 1 + delta;
    return Math.max(0, Math.round(delta * synodicMonth));
  }

  function phaseName(p){
    const names = [
      "New Moon","Waxing Crescent","First Quarter","Waxing Gibbous",
      "Full Moon","Waning Gibbous","Last Quarter","Waning Crescent"
    ];
    const idx = Math.floor(((p + 1/16) % 1) * 8);
    return names[idx];
  }

  return { phase, illumination, daysUntilNewMoon, daysUntilFullMoon, phaseName };
})();

/* ========= FIXED: Gold + Black moon render =========
   Uses a robust two-circle terminator shadow on top of a gold disc.
   This makes full/new/quarters visually consistent with the phase. */
function drawMoonGold(canvas, p, opts = {}) {
  const ctx = canvas.getContext("2d");
  const w = canvas.width, h = canvas.height;
  const cx = w/2, cy = h/2;
  const R  = Math.min(w,h) * 0.45;

  ctx.clearRect(0,0,w,h);

  const outline = opts.outline ?? 12;

  // gold gradient
  const gold = ctx.createRadialGradient(
    cx - R*0.35, cy - R*0.45, R*0.08,
    cx, cy, R*1.08
  );
  gold.addColorStop(0.00, "#fff7cc");
  gold.addColorStop(0.18, "#f7d774");
  gold.addColorStop(0.45, "#e0b94d");
  gold.addColorStop(0.72, "#b88922");
  gold.addColorStop(1.00, "#2a1d04");

  // base gold disc
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.fillStyle = gold;
  ctx.fill();

  // gloss
  const shine = ctx.createRadialGradient(
    cx - R*0.55, cy - R*0.60, 1,
    cx - R*0.25, cy - R*0.30, R*0.95
  );
  shine.addColorStop(0, "rgba(255,255,255,0.55)");
  shine.addColorStop(0.25, "rgba(255,255,255,0.18)");
  shine.addColorStop(1, "rgba(255,255,255,0)");
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.fillStyle = shine;
  ctx.fill();

  // rim
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.lineWidth = outline;
  ctx.strokeStyle = "#e0b94d";
  ctx.stroke();

  const r = R - outline*0.55;

  // clip to inner circle
  ctx.save();
  ctx.translate(cx, cy);
  ctx.beginPath();
  ctx.arc(0,0,r,0,Math.PI*2);
  ctx.clip();

  // OPTIONAL subtle texture (very light)
  if (opts.texture) {
    ctx.globalAlpha = 0.08;
    for (let i=0;i<14;i++){
      const ang = Math.random()*Math.PI*2;
      const rad = (Math.random()*0.85)*r;
      const x0 = Math.cos(ang)*rad;
      const y0 = Math.sin(ang)*rad;
      const cr = (Math.random()*0.06+0.015)*r;
      ctx.beginPath();
      ctx.ellipse(x0,y0,cr*1.15,cr,Math.random(),0,Math.PI*2);
      ctx.strokeStyle = "rgba(0,0,0,0.55)";
      ctx.lineWidth = Math.max(1, outline*0.10);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // Shadow rendering:
  // - We draw a black "terminator" shape on top of the gold disc.
  // - At p=0 (new) => shadow covers all.
  // - At p=0.5 (full) => shadow covers none.
  const a = 2 * Math.PI * p;
  let x = r * Math.cos(a);  // +r at new, 0 at quarter, -r at full

  // Make waxing light on RIGHT, waning light on LEFT:
  // Our shadow shape is built from the RIGHT semicircle of the main disc,
  // so we flip x depending on waxing/waning to keep orientation consistent.
  if (p <= 0.5) x = -x;

  // Special-cases to guarantee perfect extremes
  const illum = 0.5 * (1 - Math.cos(a));
  if (illum < 0.001) {
    // NEW: fully black
    ctx.beginPath();
    ctx.arc(0,0,r,0,Math.PI*2);
    ctx.fillStyle = "#000";
    ctx.fill();
    ctx.restore();
    return;
  }
  if (illum > 0.999) {
    // FULL: leave gold as-is
    ctx.restore();
    return;
  }

  ctx.fillStyle = "#000";
  ctx.beginPath();
  ctx.arc(0, 0, r, -Math.PI/2, Math.PI/2, false);
  ctx.arc(x, 0, r,  Math.PI/2, -Math.PI/2, true);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawMini(canvas, p){
  drawMoonGold(canvas, p, { outline: 6, texture: false });
}

/* ========= Calendar/UI ========= */
function fmtFullDateEN(d){
  return new Intl.DateTimeFormat("en-US", { dateStyle:"full" }).format(d);
}
function fmtMonthEN(d){
  return new Intl.DateTimeFormat("en-US", { month:"long", year:"numeric" }).format(d);
}
function fmtShortEN(d){
  return new Intl.DateTimeFormat("en-US", { year:"numeric", month:"short", day:"numeric" }).format(d);
}
function startOfMonth(d){ return new Date(d.getFullYear(), d.getMonth(), 1); }
function endOfMonth(d){ return new Date(d.getFullYear(), d.getMonth()+1, 0); }
function sameDay(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function mondayFirstWeekdayIndex(date){ const js=date.getDay(); return (js+6)%7; }
function isoDate(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), da=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${da}`;
}

const HOLISTIC = {
  "New Moon": { title:"New Moon — reset", text:"A quiet beginning. Set an intention, simplify, and listen inward before you act." },
  "Waxing Crescent": { title:"Waxing Crescent — grow", text:"Build momentum with small steps. Gentle routines and one clear next action." },
  "First Quarter": { title:"First Quarter — commit", text:"Choose what matters. Set boundaries and move through resistance with steadiness." },
  "Waxing Gibbous": { title:"Waxing Gibbous — refine", text:"Adjust the details. Practice, edit, and prepare—progress is small improvements." },
  "Full Moon": { title:"Full Moon — illuminate", text:"Clarity rises. Celebrate what’s working, release what’s heavy, and be honest with yourself." },
  "Waning Gibbous": { title:"Waning Gibbous — integrate", text:"Digest lessons. Reflect, share, and make meaning of what you’ve learned." },
  "Last Quarter": { title:"Last Quarter — let go", text:"Simplify and clear space. End what’s complete and keep what supports you." },
  "Waning Crescent": { title:"Waning Crescent — rest", text:"Restore your energy. Slow down, sleep, soften—emptiness makes room for renewal." }
};

let shownMonth = new Date();
let selectedISO = null;

function updateSelection(date){
  selectedISO = isoDate(date);

  const p = Moon.phase(date);
  const illum = Moon.illumination(p);
  const name = Moon.phaseName(p);

  const h = HOLISTIC[name] || { title:"Reflection", text:"Notice what this phase brings up for you." };
  document.getElementById("holisticTitle").textContent = h.title;
  document.getElementById("holisticText").textContent = h.text;

  document.getElementById("selectedDatePill").textContent = `Selected: ${fmtShortEN(date)}`;
  document.getElementById("selectedPhasePill").textContent = `Phase: ${name}`;
  document.getElementById("selectedIllumPill").textContent = `Illumination: ${Math.round(illum*100)}%`;

  renderCalendar();
}

function renderTop(){
  const today = new Date();
  document.getElementById("todayLabel").textContent = fmtFullDateEN(today);

  const p = Moon.phase(today);
  const illum = Moon.illumination(p);
  const name = Moon.phaseName(p);

  drawMoonGold(document.getElementById("bigMoon"), p, { outline: 14, texture: true });

  document.getElementById("phaseLabel").textContent =
    `${name} · ${Math.round(illum*100)}% illuminated`;

  document.getElementById("untilFull").textContent =
    `in ${Moon.daysUntilFullMoon(today)} days`;

  document.getElementById("untilNew").textContent =
    `in ${Moon.daysUntilNewMoon(today)} days`;

  updateSelection(today);
}

function renderCalendar(){
  document.getElementById("monthTitle").textContent = fmtMonthEN(shownMonth);

  const grid = document.getElementById("calendarGrid");
  grid.innerHTML = "";

  const first = startOfMonth(shownMonth);
  const last = endOfMonth(shownMonth);
  const lead = mondayFirstWeekdayIndex(first);

  for(let i=0;i<lead;i++){
    const div = document.createElement("div");
    div.className = "cell";
    div.style.visibility = "hidden";
    grid.appendChild(div);
  }

  const today = new Date();
  for(let day=1; day<=last.getDate(); day++){
    const d = new Date(shownMonth.getFullYear(), shownMonth.getMonth(), day);
    const cell = document.createElement("div");

    const isToday = sameDay(d, today);
    const isSelected = selectedISO && isoDate(d) === selectedISO;

    cell.className = "cell" + (isToday ? " today" : "") + (isSelected ? " selected" : "");

    const dayLabel = document.createElement("div");
    dayLabel.className = "day";
    dayLabel.textContent = String(day);

    const mini = document.createElement("canvas");
    mini.className = "mini";
    mini.width = 64; mini.height = 64;
    drawMini(mini, Moon.phase(d));

    cell.appendChild(dayLabel);
    cell.appendChild(mini);
    cell.addEventListener("click", () => updateSelection(d));

    grid.appendChild(cell);
  }
}

document.getElementById("prevBtn").addEventListener("click", () => {
  shownMonth = new Date(shownMonth.getFullYear(), shownMonth.getMonth()-1, 1);
  renderCalendar();
});
document.getElementById("nextBtn").addEventListener("click", () => {
  shownMonth = new Date(shownMonth.getFullYear(), shownMonth.getMonth()+1, 1);
  renderCalendar();
});

renderTop();
renderCalendar();
</script>
</body>
</html>
