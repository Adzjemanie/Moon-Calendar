<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Moon</title>
  <style>
    :root{
      --bg:#fff;
      --fg:#000;
      --muted: rgba(0,0,0,.62);
      --hair: rgba(0,0,0,.14);
      --radius: 18px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: ui-rounded, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background:var(--bg);
      color:var(--fg);
    }
    .wrap{
      max-width: 760px;
      margin: 0 auto;
      padding: 22px;
    }
    header{
      text-align:center;
      margin-top: 6px;
    }
    header h1{
      margin:0;
      font-size: 26px;
      font-weight: 750;
      letter-spacing: .2px;
    }
    header .date{
      margin-top: 8px;
      font-size: 14px;
      color: var(--muted);
    }

    .moon-stage{
      display:flex;
      justify-content:center;
      margin: 18px 0 10px;
    }
    canvas#bigMoon{
      width: 320px;
      height: 320px;
      border-radius: 999px;
      display:block;
    }

    .phase-line{
      text-align:center;
      margin-top: 2px;
      font-size: 14px;
      color: var(--muted);
    }

    .meta{
      text-align:center;
      line-height: 1.55;
      margin: 14px 0 18px;
      font-size: 18px;
    }

    .card{
      border: 1px solid var(--hair);
      border-radius: var(--radius);
      padding: 14px;
      background: #fff;
    }

    .cal-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      margin: 6px 0 10px;
    }
    .cal-head .title{
      font-size: 16px;
      font-weight: 700;
    }
    .btns{ display:flex; gap: 10px; }
    button{
      border: 1px solid var(--hair);
      background: var(--bg);
      color: var(--fg);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 14px;
      cursor:pointer;
    }
    button:hover{ border-color: rgba(0,0,0,.28); }

    .weekdays{
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-align:center;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px 8px;
    }

    .cell{
      height: 56px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      gap: 6px;
      border-radius: 12px;
      padding-top: 7px;
      cursor: pointer;
      user-select: none;
    }
    .cell:hover{
      outline: 1px solid rgba(0,0,0,.18);
      outline-offset: -1px;
    }
    .cell.today{
      outline: 2px solid rgba(0,0,0,.22);
      outline-offset: -2px;
    }
    .cell.selected{
      outline: 2px solid rgba(0,0,0,.40);
      outline-offset: -2px;
    }
    .day{
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
    }
    canvas.mini{
      width: 18px;
      height: 18px;
      border-radius: 999px;
      display:block;
    }

    .explain{
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--hair);
    }
    .explain h2{
      margin: 0 0 6px 0;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .2px;
    }
    .explain p{
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }
    .detail{
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed rgba(0,0,0,.18);
      display:flex;
      gap: 10px;
      align-items: baseline;
      flex-wrap: wrap;
    }
    .pill{
      border: 1px solid var(--hair);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--fg);
      background: #fff;
    }
    .pill.muted{ color: var(--muted); }

    footer{
      text-align:center;
      color: var(--muted);
      font-size: 12px;
      margin-top: 14px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <h1>Moon</h1>
      <div class="date" id="todayLabel"></div>
    </header>

    <div class="moon-stage">
      <canvas id="bigMoon" width="700" height="700" aria-label="Moon phase"></canvas>
    </div>

    <div class="phase-line" id="phaseLabel"></div>

    <div class="meta">
      <div id="untilFull"></div>
      <div id="untilNew"></div>
    </div>

    <section class="card">
      <div class="cal-head">
        <div class="title" id="monthTitle"></div>
        <div class="btns">
          <button id="prevBtn" type="button">Prev</button>
          <button id="nextBtn" type="button">Next</button>
        </div>
      </div>

      <div class="weekdays">
        <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
      </div>

      <div class="grid" id="calendarGrid"></div>

      <div class="explain">
        <h2 id="holisticTitle">Reflection</h2>
        <p id="holisticText"></p>

        <div class="detail">
          <span class="pill" id="selectedDatePill">Selected: —</span>
          <span class="pill muted" id="selectedPhasePill">Phase: —</span>
          <span class="pill muted" id="selectedIllumPill">Illumination: —</span>
        </div>
      </div>
    </section>

    <footer>
      New Moon = fully dark · Full Moon = fully bright · Quarters are exactly half.
    </footer>
  </div>

<script>
/**
 * Practical moon phase approximation:
 * phase in [0,1): 0 = New Moon, 0.5 = Full Moon
 * Uses synodic month + a common epoch near 2000-01-06 18:14 UTC.
 */
const Moon = (() => {
  const synodicMonth = 29.53058867; // days
  const epoch = new Date(Date.UTC(2000,0,6,18,14,0));

  function phase(date){
    const ms = date.getTime() - epoch.getTime();
    const days = ms / 86400000;
    const lunations = days / synodicMonth;
    let frac = lunations - Math.floor(lunations);
    if (frac < 0) frac += 1;
    return frac;
  }

  function illumination(p){ // 0..1, 0=new, 1=full
    return 0.5 * (1 - Math.cos(2 * Math.PI * p));
  }

  function daysUntilNewMoon(date){
    const p = phase(date);
    return Math.max(0, Math.round((1 - p) * synodicMonth));
  }

  function daysUntilFullMoon(date){
    const p = phase(date);
    let delta = (0.5 - p);
    if (delta < 0) delta = 1 + delta;
    return Math.max(0, Math.round(delta * synodicMonth));
  }

  function phaseName(p){
    const names = [
      "New Moon",
      "Waxing Crescent",
      "First Quarter",
      "Waxing Gibbous",
      "Full Moon",
      "Waning Gibbous",
      "Last Quarter",
      "Waning Crescent"
    ];
    const idx = Math.floor(((p + 1/16) % 1) * 8);
    return names[idx];
  }

  return { phase, illumination, daysUntilNewMoon, daysUntilFullMoon, phaseName };
})();

/**
 * Correct terminator drawing that guarantees:
 * - New Moon fully black
 * - Full Moon fully white
 * - First/Last Quarter exactly half
 * - Smooth transition between days
 */
function drawMoon(canvas, phase, opts = {}) {
  const ctx = canvas.getContext("2d");
  const w = canvas.width, h = canvas.height;
  const cx = w / 2, cy = h / 2;
  const r = Math.min(w, h) * 0.44;

  ctx.clearRect(0, 0, w, h);

  const outline = opts.outline ?? Math.max(6, r * 0.022);

  // Outline
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = "#000";
  ctx.lineWidth = outline;
  ctx.stroke();

  // White base disc
  ctx.beginPath();
  ctx.arc(cx, cy, r - outline * 0.6, 0, Math.PI * 2);
  ctx.fillStyle = "#fff";
  ctx.fill();

  // Work inside moon
  ctx.save();
  ctx.translate(cx, cy);

  const rr = r - outline * 0.6;

  // Clip to circle
  ctx.beginPath();
  ctx.arc(0, 0, rr, 0, Math.PI * 2);
  ctx.clip();

  // Optional subtle grain (very light)
  if (opts.grain) {
    ctx.globalAlpha = 0.06;
    for (let i = 0; i < 18; i++) {
      const ang = Math.random() * Math.PI * 2;
      const rad = (Math.random() * 0.85) * rr;
      const xg = Math.cos(ang) * rad;
      const yg = Math.sin(ang) * rad;
      const cr = (Math.random() * 0.06 + 0.015) * rr;
      ctx.beginPath();
      ctx.ellipse(xg, yg, cr * 1.1, cr, Math.random(), 0, Math.PI * 2);
      ctx.strokeStyle = "#000";
      ctx.lineWidth = Math.max(1, outline * 0.16);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // --- Terminator shadow ---
  // x = cos(2π phase):
  // phase 0.0 => x=+1 => fully black (new)
  // phase 0.25 => x=0 => half
  // phase 0.5 => x=-1 => fully white (full)
  const x = rr * Math.cos(2 * Math.PI * phase);

  ctx.fillStyle = "#000";
  ctx.beginPath();
  ctx.arc(0, 0, rr, -Math.PI / 2, Math.PI / 2, false);
  ctx.arc(x, 0, rr, Math.PI / 2, -Math.PI / 2, true);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawMiniMoon(canvas, phase){
  drawMoon(canvas, phase, { outline: 4, grain: false });
}

function fmtFullDateEN(d){
  return new Intl.DateTimeFormat("en-US", { dateStyle:"full" }).format(d);
}
function fmtMonthEN(d){
  return new Intl.DateTimeFormat("en-US", { month:"long", year:"numeric" }).format(d);
}
function fmtShortEN(d){
  return new Intl.DateTimeFormat("en-US", { year:"numeric", month:"short", day:"numeric" }).format(d);
}
function startOfMonth(date){ return new Date(date.getFullYear(), date.getMonth(), 1); }
function endOfMonth(date){ return new Date(date.getFullYear(), date.getMonth()+1, 0); }

// Monday-first index: Mon=0..Sun=6
function mondayFirstWeekdayIndex(date){
  const js = date.getDay(); // Sun=0..Sat=6
  return (js + 6) % 7;
}
function sameDay(a,b){
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}

const HOLISTIC = {
  "New Moon": {
    title: "New Moon — reset",
    text: "A quiet beginning. Set an intention, simplify, and listen inward before you act."
  },
  "Waxing Crescent": {
    title: "Waxing Crescent — grow",
    text: "Build momentum with small steps. Gentle routines and one clear next action."
  },
  "First Quarter": {
    title: "First Quarter — commit",
    text: "Choose what matters. Set boundaries and move through resistance with steadiness."
  },
  "Waxing Gibbous": {
    title: "Waxing Gibbous — refine",
    text: "Adjust the details. Practice, edit, and prepare—progress is often small improvements."
  },
  "Full Moon": {
    title: "Full Moon — illuminate",
    text: "Clarity rises. Celebrate what’s working, release what’s heavy, and be honest with yourself."
  },
  "Waning Gibbous": {
    title: "Waning Gibbous — integrate",
    text: "Digest lessons. Reflect, share, and make meaning of what you’ve learned."
  },
  "Last Quarter": {
    title: "Last Quarter — let go",
    text: "Simplify and clear space. End what’s complete and keep what supports you."
  },
  "Waning Crescent": {
    title: "Waning Crescent — rest",
    text: "Restore your energy. Slow down, sleep, soften—emptiness makes room for renewal."
  }
};

let shownMonth = new Date();
let selectedISO = null; // "YYYY-MM-DD"

function isoDate(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function setSelected(date){
  selectedISO = isoDate(date);
  updateSelectionUI(date);
  renderCalendar(); // to redraw selection outline
}

function updateSelectionUI(date){
  const p = Moon.phase(date);
  const illum = Moon.illumination(p);
  const name = Moon.phaseName(p);

  const h = HOLISTIC[name] ?? { title: "Reflection", text: "Notice what this phase brings up for you." };
  document.getElementById("holisticTitle").textContent = h.title;
  document.getElementById("holisticText").textContent = h.text;

  document.getElementById("selectedDatePill").textContent = `Selected: ${fmtShortEN(date)}`;
  document.getElementById("selectedPhasePill").textContent = `Phase: ${name}`;
  document.getElementById("selectedIllumPill").textContent = `Illumination: ${Math.round(illum*100)}%`;
}

function render(){
  const today = new Date();
  document.getElementById("todayLabel").textContent = fmtFullDateEN(today);

  const p = Moon.phase(today);
  const illum = Moon.illumination(p);
  const name = Moon.phaseName(p);

  drawMoon(document.getElementById("bigMoon"), p, { outline: 8, grain: true });

  document.getElementById("phaseLabel").textContent =
    `${name} · ${Math.round(illum*100)}% illuminated`;

  document.getElementById("untilFull").textContent =
    `Next Full Moon in ${Moon.daysUntilFullMoon(today)} days`;

  document.getElementById("untilNew").textContent =
    `Next New Moon in ${Moon.daysUntilNewMoon(today)} days`;

  // default selection: today
  setSelected(today);

  renderCalendar();
}

function renderCalendar(){
  const grid = document.getElementById("calendarGrid");
  grid.innerHTML = "";

  document.getElementById("monthTitle").textContent = fmtMonthEN(shownMonth);

  const first = startOfMonth(shownMonth);
  const last = endOfMonth(shownMonth);
  const lead = mondayFirstWeekdayIndex(first);

  for(let i=0;i<lead;i++){
    const div = document.createElement("div");
    div.className = "cell";
    div.style.visibility = "hidden";
    grid.appendChild(div);
  }

  const today = new Date();
  for(let day=1; day<=last.getDate(); day++){
    const d = new Date(shownMonth.getFullYear(), shownMonth.getMonth(), day);
    const cell = document.createElement("div");

    const isToday = sameDay(d,today);
    const isSelected = (selectedISO && isoDate(d) === selectedISO);

    cell.className = "cell" +
      (isToday ? " today" : "") +
      (isSelected ? " selected" : "");

    const dayLabel = document.createElement("div");
    dayLabel.className = "day";
    dayLabel.textContent = String(day);

    const mini = document.createElement("canvas");
    mini.className = "mini";
    mini.width = 64; mini.height = 64;
    drawMiniMoon(mini, Moon.phase(d));

    cell.appendChild(dayLabel);
    cell.appendChild(mini);

    cell.addEventListener("click", () => setSelected(d));

    grid.appendChild(cell);
  }
}

document.getElementById("prevBtn").addEventListener("click", () => {
  shownMonth = new Date(shownMonth.getFullYear(), shownMonth.getMonth()-1, 1);
  renderCalendar();
});
document.getElementById("nextBtn").addEventListener("click", () => {
  shownMonth = new Date(shownMonth.getFullYear(), shownMonth.getMonth()+1, 1);
  renderCalendar();
});

render();
</script>
</body>
</html>
